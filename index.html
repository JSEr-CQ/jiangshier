<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSEr 网站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      overflow: hidden;
    }
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      perspective: 1000px;
    }
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      opacity: 0;
      /* 入场动画5秒后完全显示 */
      animation: fadeInContent 1s ease 5s forwards;
    }
    .title {
      font-size: 3rem;
      margin-bottom: 20px;
      text-shadow: 0 0 15px #00ccff, 0 0 30px #00ccff;
    }
    .section {
      display: none;
      width: 100%;
      height: 100vh;
      padding: 80px 50px 50px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
      opacity: 0;
      transition: opacity 0.3s ease;
      position: relative;
      z-index: 2;
    }
    .section h2 {
      font-size: 2rem;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #ff00cc, 0 0 20px #ff00cc;
    }
    .section p {
      font-size: 1.2rem;
      line-height: 1.8;
      margin-bottom: 20px;
    }
    /* 左上角导航按钮 - 渐变圆角样式 */
    .nav {
      position: fixed;
      top: 20px;
      left: 20px;
      display: flex;
      gap: 12px;
      z-index: 3;
    }
    .nav-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #00ccff, #9900ff);
      box-shadow: 0 0 10px #00ccff, inset 0 2px 2px rgba(255,255,255,0.2);
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
    }
    .nav-btn.active {
      background: linear-gradient(135deg, #ff00cc, #ff6600);
      box-shadow: 0 0 15px #ff00cc, 0 0 25px #ff00cc;
      transform: scale(1.1);
    }
    .back-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 3;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #00ff99, #00ccff);
      border: none;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 1rem;
      box-shadow: 0 0 10px #00ff99;
      transition: all 0.3s;
    }
    .back-btn:hover {
      box-shadow: 0 0 15px #00ff99, 0 0 20px #00ff99;
      transform: scale(1.05);
    }
    @keyframes fadeInContent {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="content" id="home">
    <h1 class="title">JSEr</h1>
    <p>给用户极致体验</p>
    <!-- 左上角导航按钮：1/2/3/4 -->
    <div class="nav">
      <button class="nav-btn" data-section="1">1</button>
      <button class="nav-btn" data-section="2">2</button>
      <button class="nav-btn" data-section="3">3</button>
      <button class="nav-btn" data-section="4">4</button>
    </div>
  </div>
  <div class="section" id="section1">
    <h2>板块一：设计理念</h2>
    <p>我们的设计融合宇宙星空的视觉震撼，以简洁的布局呈现丰富内容。每一个元素都如星尘般错落有致，交互时的点亮效果让你聚焦核心信息。</p>
    <button class="back-btn">返回首页</button>
  </div>
  <div class="section" id="section2">
    <h2>板块二：技术实现</h2>
    <p>采用 Canvas 技术模拟星空粒子，结合鼠标交互实现黑洞吸附效果。页面切换时的3D转场，让你体验穿梭宇宙的沉浸感。</p>
    <button class="back-btn">返回首页</button>
  </div>
  <div class="section" id="section3">
    <h2>板块三：功能亮点</h2>
    <p>支持板块点亮、轮播展示、底部导航切换等功能。每个板块内容清晰，整体页面整洁美观，让你在探索中感受设计的乐趣-by小狗。</p>
    <button class="back-btn">返回首页</button>
  </div>
  <div class="section" id="section4">
    <h2>板块四：关于我们</h2>
    <p>Telegram官方频道jsehelp为用户带来沉浸式的浏览体验。</p>
    <button class="back-btn">返回首页</button>
  </div>

  <script>
    // 核心粒子动画：汇聚→散开→鼠标跟随（固定大小+鲜艳颜色，总时长5秒）
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const particleCount = 1200;
    let particles = [];
    let mouse = { x: canvas.width/2, y: canvas.height/2 };
    let stage = 1; // 1=汇聚 2=散开 3=鼠标跟随
    const centerX = canvas.width/2;
    const centerY = canvas.height/2;

    // 粒子类（固定半径，无放大，鲜艳配色）
    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.r = 2; // 固定粒子大小，永不改变
        // 高饱和鲜艳颜色：蓝、粉、紫、青、黄、橙
        this.color = ['#00ccff', '#ff00cc', '#9900ff', '#00ff99', '#ffff00', '#ff6600'][Math.floor(Math.random()*6)];
        this.speed = Math.random() * 4 + 2; // 提速适配5秒总时长
        // 汇聚目标点（JSEr文字区域）
        this.targetX = centerX + (Math.random()*200 - 100);
        this.targetY = centerY + (Math.random()*100 - 50);
        this.originalX = this.x;
        this.originalY = this.y;
      }

      update() {
        if (stage === 1) { // 汇聚（约2.5秒）
          const dx = this.targetX - this.x;
          const dy = this.targetY - this.y;
          if (Math.hypot(dx, dy) > 1) {
            this.x += dx/Math.hypot(dx, dy) * this.speed;
            this.y += dy/Math.hypot(dx, dy) * this.speed;
          } else {
            // 汇聚完成后停留0.5秒，再散开
            if (particles.every(p => Math.hypot(p.targetX-p.x, p.targetY-p.y) < 2)) {
              setTimeout(() => stage = 2, 500);
            }
          }
        } else if (stage === 2) { // 散开（约2秒，合计5秒完成入场）
          const dx = this.originalX - this.x;
          const dy = this.originalY - this.y;
          if (Math.hypot(dx, dy) > 1) {
            this.x += dx/Math.hypot(dx, dy) * (this.speed/2);
            this.y += dy/Math.hypot(dx, dy) * (this.speed/2);
          } else {
            stage = 3; // 5秒后进入鼠标跟随阶段
          }
        } else if (stage === 3) { // 鼠标跟随（固定形态）
          const dx = mouse.x - this.x;
          const dy = mouse.y - this.y;
          if (Math.hypot(dx, dy) > 60) {
            this.x += dx/Math.hypot(dx, dy) * (this.speed/3);
            this.y += dy/Math.hypot(dx, dy) * (this.speed/3);
          }
        }
      }

      draw() {
        // 粒子本体
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
        ctx.fillStyle = this.color;
        ctx.fill();
        // 鲜艳光效（不放大）
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r*2.5, 0, Math.PI*2);
        ctx.fillStyle = `${this.color}40`;
        ctx.fill();
      }
    }

    // 初始化粒子
    function init() {
      particles = [];
      for (let i=0; i<particleCount; i++) {
        particles.push(new Particle());
      }
    }

    // 动画主函数
    function animate() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animate);
    }

    // 鼠标跟随事件
    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    // 窗口适配
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      init();
    });

    // 板块切换功能（100%正常，无冲突）
    const navBtns = document.querySelectorAll('.nav-btn');
    const sections = document.querySelectorAll('.section');
    const home = document.getElementById('home');
    const backBtns = document.querySelectorAll('.back-btn');

    // 左上角导航点击
    navBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        home.style.display = 'none';
        const sec = document.getElementById(`section${btn.dataset.section}`);
        sec.style.display = 'block';
        setTimeout(() => sec.style.opacity = 1, 50);
        navBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // 返回首页点击
    backBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        sections.forEach(sec => {
          sec.style.opacity = 0;
          setTimeout(() => sec.style.display = 'none', 200);
        });
        home.style.display = 'flex';
        navBtns.forEach(b => b.classList.remove('active'));
      });
    });

    // 启动动画
    init();
    animate();
  </script>
</body>
</html>
