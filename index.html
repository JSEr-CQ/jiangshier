<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSEr</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;overflow:hidden}
  body{background:#000;color:#fff;font-family:Arial,sans-serif}
  #canvas{position:fixed;top:0;left:0;z-index:0}
  .content{position:relative;z-index:1;width:100%;height:100vh;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    text-align:center;padding:20px;opacity:0;animation:show 1.2s ease 2.8s forwards}
  .title{font-size:3rem;margin-bottom:10px;text-shadow:0 0 15px #00ccff,0 0 30px #00ccff}
  .nav{position:fixed;top:22px;left:20px;display:flex;gap:14px;z-index:999}
  .star-btn{width:36px;height:36px;background:transparent;border:none;
    font-size:22px;cursor:pointer;transition:all 0.3s;
    filter:drop-shadow(0 0 6px #00ccff)}
  .star-btn.active{color:#ff00cc;filter:drop-shadow(0 0 10px #ff00cc)}
  .section{display:none;position:relative;z-index:2;width:100%;height:100vh;
    padding:90px 30px;background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);
    opacity:0;transition:opacity 0.35s ease}
  .section h2{font-size:2rem;margin-bottom:24px;text-shadow:0 0 10px #ff00cc}
  .section p{font-size:1rem;line-height:1.7;margin-bottom:16px}
  .back{position:fixed;top:22px;right:20px;padding:8px 16px;
    background:#111;color:#fff;border-radius:10px;border:none;
    box-shadow:0 0 8px #00ccff;cursor:pointer;z-index:999}
  @keyframes show{to{opacity:1}}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="content" id="home">
  <h1 class="title">JSEr</h1>
  <p>江十二 · 极致体验</p>
  <div class="nav">
    <button class="star-btn" data-sec="1">⭐</button>
    <button class="star-btn" data-sec="2">⭐</button>
    <button class="star-btn" data-sec="3">⭐</button>
    <button class="star-btn" data-sec="4">⭐</button>
  </div>
</div>

<div class="section" id="sec1">
  <h2>板块一</h2>
  <p>粒子汇聚 · 流畅动画 · 鼠标互动</p>
  <button class="back">返回</button>
</div>
<div class="section" id="sec2">
  <h2>板块二</h2>
  <p>丝滑体验 · 不卡顿 · 不僵硬</p>
  <button class="back">返回</button>
</div>
<div class="section" id="sec3">
  <h2>板块三</h2>
  <p>左上角五角星导航 · 点击即开</p>
  <button class="back">返回</button>
</div>
<div class="section" id="sec4">
  <h2>板块四</h2>
  <p>小新.help · 专属页面</p>
  <button class="back">返回</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let w = canvas.width = innerWidth;
let h = canvas.height = innerHeight;

let particles = [];
let mouse = {x:w/2, y:h/2, down:false};
let phase = 0;
let textImg;

class Particle{
  constructor(){
    this.x = Math.random()*w;
    this.y = Math.random()*h;
    this.s = 2.5 + Math.random()*1.5;
    this.vx = 0;
    this.vy = 0;
    this.c = ['#00ccff','#ff00cc','#9900ff','#00ff99','#ffff00'][Math.random()*5|0];
  }
  update(){
    if(phase === 0){
      let tx = w/2, ty = h/2 - 30;
      let dx = tx-this.x, dy=ty-this.y;
      let d = Math.hypot(dx,dy);
      this.vx = dx/d*4 + (Math.random()-0.5)*0.6;
      this.vy = dy/d*4 + (Math.random()-0.5)*0.6;
      if(d<60) phase=1;
    }
    else if(phase === 1){
      let dx = mouse.x-this.x, dy=mouse.y-this.y;
      let d = Math.hypot(dx,dy);
      let f = Math.min(12/d,2);
      this.vx += dx*f*0.25;
      this.vy += dy*f*0.25;
      this.vx *= 0.92;
      this.vy *= 0.92;
    }
    this.x += this.vx;
    this.y += this.vy;
  }
  draw(){
    ctx.fillStyle=this.c;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.s,0,Math.PI*2);
    ctx.fill();
  }
}

function init(){
  particles=[];
  for(let i=0;i<900;i++) particles.push(new Particle());
}

function drawText(){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#fff';
  ctx.font='bold 90px Arial';
  ctx.textAlign='center';
  ctx.fillText('JSEr',w/2,h/2);
  textImg = ctx.getImageData(0,0,w,h).data;
}

function animate(){
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.fillRect(0,0,w,h);
  particles.forEach(p=>{p.update();p.draw()});
  requestAnimationFrame(animate);
}

drawText();
init();
animate();

onmousemove = e => {mouse.x=e.x;mouse.y=e.y};
onresize = () => {w=canvas.width=innerWidth;h=canvas.height=innerHeight;drawText()};

const stars = document.querySelectorAll('.star-btn');
const sections = document.querySelectorAll('.section');
const home = document.getElementById('home');

stars.forEach((s,i)=>{
  s.onclick=()=>{
    home.style.display='none';
    sections.forEach(t=>t.style.display='none');
    const t = document.getElementById('sec'+s.dataset.sec);
    t.style.display='block';
    setTimeout(()=>t.style.opacity=1,20);
    stars.forEach(x=>x.classList.remove('active'));
    s.classList.add('active');
  }
})

document.querySelectorAll('.back').forEach(b=>{
  b.onclick=()=>{
    sections.forEach(t=>t.style.opacity=0);
    setTimeout(()=>{
      sections.forEach(t=>t.style.display='none');
      home.style.display='flex';
      stars.forEach(x=>x.classList.remove('active'));
    },300);
  }
})
</script>
</body>
</html>
