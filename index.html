<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSEr 网站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      overflow: hidden;
    }
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      perspective: 1000px;
    }
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      transform: translateZ(-50px);
    }
    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      transform: translateZ(0);
      opacity: 0;
      animation: fadeInContent 1s ease 4s forwards;
    }
    .title {
      font-size: 3rem;
      margin-bottom: 20px;
      text-shadow: 0 0 15px #fff, 0 0 30px #66ccff;
    }
    .section {
      display: none;
      width: 100%;
      height: 100vh;
      padding: 50px;
      transform: translateZ(0);
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .section h2 {
      font-size: 2rem;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #fff, 0 0 20px #66ccff;
    }
    .section p {
      font-size: 1.2rem;
      line-height: 1.8;
      margin-bottom: 20px;
    }
    .nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateZ(0);
      display: flex;
      gap: 10px;
      z-index: 2;
    }
    .nav-btn {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 0 5px rgba(255,255,255,0.5);
    }
    .nav-btn.active {
      background: #66ccff;
      box-shadow: 0 0 10px #66ccff, 0 0 20px #66ccff;
      transform: scale(1.2);
    }
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 2;
      cursor: pointer;
      transform: translateZ(0);
      color: #66ccff;
      text-shadow: 0 0 5px #66ccff;
    }
    /* 入场动画样式 */
    @keyframes fadeInContent {
      to { opacity: 1; }
    }
    #titleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
      transform: translateZ(0);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <canvas id="titleCanvas"></canvas>
  <div class="content" id="home">
    <h1 class="title">JSEr</h1>
    <p>给用户极致体验</p>
    <div class="nav">
      <div class="nav-btn" data-section="1"></div>
      <div class="nav-btn" data-section="2"></div>
      <div class="nav-btn" data-section="3"></div>
      <div class="nav-btn" data-section="4"></div>
    </div>
  </div>
  <div class="section" id="section1">
    <h2>板块一：设计理念</h2>
    <p>我们的设计融合宇宙星空的视觉震撼，以简洁的布局呈现丰富内容。每一个元素都如星尘般错落有致，交互时的点亮效果让你聚焦核心信息。</p>
    <div class="back-btn">返回首页</div>
  </div>
  <div class="section" id="section2">
    <h2>板块二：技术实现</h2>
    <p>采用 Canvas 技术模拟星空粒子，结合鼠标交互实现黑洞吸附效果。页面切换时的3D转场，让你体验穿梭宇宙的沉浸感。</p>
    <div class="back-btn">返回首页</div>
  </div>
  <div class="section" id="section3">
    <h2>板块三：功能亮点</h2>
    <p>支持板块点亮、轮播展示、底部导航切换等功能。每个板块内容清晰，整体页面整洁美观，让你在探索中感受设计的乐趣-by小狗。</p>
    <div class="back-btn">返回首页</div>
  </div>
  <div class="section" id="section4">
    <h2>板块四：关于我们</h2>
    <p>Telegram官方频道jsehelp为用户带来沉浸式的浏览体验。</p>
    <div class="back-btn">返回首页</div>
  </div>
  <script>
    // 标题粒子入场+散开+鼠标跟随核心
    const titleCanvas = document.getElementById('titleCanvas');
    const titleCtx = titleCanvas.getContext('2d');
    titleCanvas.width = window.innerWidth;
    titleCanvas.height = window.innerHeight;
    const titleParticleCount = 1800;
    let titleParticles = [];
    let animateTitle = true;
    let stage = 1; // 1=汇聚 2=散开 3=鼠标跟随
    let mouse = { x: titleCanvas.width/2, y: titleCanvas.height/2 };

    // 标题粒子类（固定半径，鲜艳颜色）
    class TitleParticle {
      constructor() {
        this.x = Math.random() * titleCanvas.width;
        this.y = Math.random() * titleCanvas.height;
        this.radius = 2; // 固定粒子大小
        // 鲜艳高饱和颜色：蓝、粉、紫、青、黄
        const colors = ['#00ccff', '#ff00cc', '#9900ff', '#00ff99', '#ffff00', '#ff6600'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.speed = Math.random() * 4 + 2; // 移动速度
        this.targetX = 0;
        this.targetY = 0;
        this.originalX = this.x;
        this.originalY = this.y;
      }
      update() {
        if (!animateTitle) return;
        // 阶段1：汇聚成JSEr
        if (stage === 1) {
          const dx = this.targetX - this.x;
          const dy = this.targetY - this.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          if (distance > 1) {
            this.x += dx / distance * this.speed;
            this.y += dy / distance * this.speed;
          } else {
            // 全部汇聚完成后切换到散开阶段
            if (titleParticles.every(p => Math.sqrt((p.targetX-p.x)**2 + (p.targetY-p.y)**2) < 2)) {
              setTimeout(() => { stage = 2; }, 800);
            }
          }
        }
        // 阶段2：从JSEr散开
        else if (stage === 2) {
          const dx = this.originalX - this.x;
          const dy = this.originalY - this.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          if (distance > 1) {
            this.x += dx / distance * (this.speed/1.5);
            this.y += dy / distance * (this.speed/1.5);
          } else {
            stage = 3;
          }
        }
        // 阶段3：固定形态跟随鼠标
        else if (stage === 3) {
          const dx = mouse.x - this.x;
          const dy = mouse.y - this.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          if (distance > 50) {
            this.x += dx / distance * (this.speed/3);
            this.y += dy / distance * (this.speed/3);
          }
        }
      }
      draw() {
        titleCtx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        titleCtx.fillStyle = this.color;
        titleCtx.fill();
        // 鲜艳光晕强化
        titleCtx.beginPath();
        titleCtx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
        titleCtx.fillStyle = `${this.color}40`;
        titleCtx.fill();
      }
    }

    // 生成JSEr文字点位
    function createJSErPoints() {
      const points = [];
      const centerX = titleCanvas.width / 2;
      const centerY = titleCanvas.height / 2;
      const fontSize = 200;

      titleCtx.font = `bold ${fontSize}px Arial`;
      titleCtx.textAlign = 'center';
      titleCtx.textBaseline = 'middle';
      titleCtx.fillText('JSEr', centerX, centerY);

      const imageData = titleCtx.getImageData(0, 0, titleCanvas.width, titleCanvas.height);
      const data = imageData.data;
      titleCtx.clearRect(0, 0, titleCanvas.width, titleCanvas.height);

      for (let y = 0; y < titleCanvas.height; y += 5) {
        for (let x = 0; x < titleCanvas.width; x += 5) {
          const index = (y * titleCanvas.width + x) * 4;
          if (data[index + 3] > 100) {
            points.push({ x, y });
          }
        }
      }
      return points;
    }

    // 初始化标题粒子
    function initTitleParticles() {
      titleParticles = [];
      const points = createJSErPoints();
      for (let i = 0; i < titleParticleCount; i++) {
        const p = new TitleParticle();
        const randomPoint = points[Math.floor(Math.random() * points.length)];
        p.targetX = randomPoint.x;
        p.targetY = randomPoint.y;
        titleParticles.push(p);
      }
    }

    // 标题动画主函数
    function animateTitleParticles() {
      titleCtx.clearRect(0, 0, titleCanvas.width, titleCanvas.height);
      titleParticles.forEach(p => {
        p.update();
        p.draw();
      });
      if (animateTitle) requestAnimationFrame(animateTitleParticles);
    }

    // 4秒后隐藏标题画布遮罩，和主内容融合
    setTimeout(() => {
      titleCanvas.style.opacity = 0.8;
      titleCanvas.style.transition = 'opacity 0.8s ease';
    }, 4000);

    // 鼠标跟随事件
    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    // 初始化标题入场动画
    initTitleParticles();
    animateTitleParticles();

    // 原有3D星空Canvas核心（保留所有功能）
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const particleCount = 600;
    let particles = [];
    let starMouse = { x: canvas.width/2, y: canvas.height/2, down: false };

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width - canvas.width/2;
        this.y = Math.random() * canvas.height - canvas.height/2;
        this.z = Math.random() * 1000 - 500;
        this.radius = Math.random() * 3 + 1;
        // 星空也用鲜艳颜色
        const colors = ['#00ccff', '#ff00cc', '#9900ff', '#00ff99', '#ffff00'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.speed = Math.random() * 0.3 + 0.1;
      }
      project() {
        this.scale = 1000 / (1000 + this.z);
        this.screenX = canvas.width/2 + this.x * this.scale;
        this.screenY = canvas.height/2 + this.y * this.scale;
        this.screenR = this.radius * this.scale;
      }
      update() {
        const dx = starMouse.x - (canvas.width/2 + this.x * (1000/(1000+this.z)));
        const dy = starMouse.y - (canvas.height/2 + this.y * (1000/(1000+this.z)));
        const distance = Math.sqrt(dx*dx + dy*dy);
        const force = Math.max(0, 1 - distance/300) * 0.8;
        this.x += dx * force * 0.01 * this.scale;
        this.y += dy * force * 0.01 * this.scale;
        this.x += Math.sin(this.z * 0.001) * this.speed;
        this.y += Math.cos(this.z * 0.001) * this.speed;
        this.z -= this.speed * 2;
        if (this.z < -1000 || this.screenR < 0) {
          this.x = Math.random() * canvas.width - canvas.width/2;
          this.y = Math.random() * canvas.height - canvas.height/2;
          this.z = 1000;
          this.radius = Math.random() * 3 + 1;
        }
        this.project();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.screenX, this.screenY, this.screenR, 0, Math.PI*2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.screenX, this.screenY, this.screenR*2, 0, Math.PI*2);
        ctx.fillStyle = `${this.color}33`;
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i=0; i<particleCount; i++) {
        particles.push(new Particle());
        particles[i].project();
      }
    }

    function createExplosion(x, y) {
      for (let i=0; i<50; i++) {
        const p = new Particle();
        p.x = x - canvas.width/2;
        p.y = y - canvas.height/2;
        p.z = Math.random() * 500 - 250;
        p.radius = Math.random() * 2 + 0.5;
        p.speed = Math.random() * 2 + 1;
        particles.push(p);
        p.project();
      }
    }

    function animate() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animate);
    }

    window.addEventListener('mousemove', (e) => {
      starMouse.x = e.clientX;
      starMouse.y = e.clientY;
    });
    window.addEventListener('click', (e) => {
      createExplosion(e.clientX, e.clientY);
    });
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      titleCanvas.width = window.innerWidth;
      titleCanvas.height = window.innerHeight;
      initParticles();
      if (animateTitle) initTitleParticles();
    });

    initParticles();
    animate();

    // 原有板块切换功能
    const navBtns = document.querySelectorAll('.nav-btn');
    const sections = document.querySelectorAll('.section');
    const home = document.getElementById('home');
    const backBtns = document.querySelectorAll('.back-btn');

    navBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const sectionId = `section${btn.dataset.section}`;
        home.style.display = 'none';
        const targetSec = document.getElementById(sectionId);
        targetSec.style.display = 'block';
        setTimeout(() => { targetSec.style.opacity = 1; }, 100);
        navBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    backBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        sections.forEach(sec => {
          sec.style.opacity = 0;
          setTimeout(() => { sec.style.display = 'none'; }, 300);
        });
        home.style.display = 'flex';
        setTimeout(() => { home.style.opacity = 1; }, 100);
        navBtns.forEach(b => b.classList.remove('active'));
      });
    });

    // 窗口大小变化适配
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      titleCanvas.width = window.innerWidth;
      titleCanvas.height = window.innerHeight;
      initParticles();
      if (animateTitle) {
        titleCtx.clearRect(0,0,titleCanvas.width,titleCanvas.height);
        initTitleParticles();
      }
    });
  </script>
</body>
</html>
